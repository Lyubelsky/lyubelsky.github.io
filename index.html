<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lyubelsky</title>
  <style>
    :root {
      /* Intense dark blue dominant, fading to deep purple */
      --bg-start: #020c1a;       /* Almost black deep blue */
      --bg-mid: #051f3d;         /* Intense dark blue */
      --bg-end: #1a1235;         /* Dark purple */
      
      --gradient: linear-gradient(135deg, var(--bg-start), var(--bg-mid) 60%, var(--bg-end) 100%);
      
      --text-main: #f1f5f9;      /* Very light off-white for contrast */
      --text-muted: #64748b;     /* Gray-blue for secondary text */
      --accent-glow: rgba(59, 130, 246, 0.6);
      --badge-bg: rgba(8, 24, 48, 0.7);
      --badge-border: rgba(96, 165, 250, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      user-select: none;
    }

    /* Subtle floating particles for atmosphere */
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 10s infinite ease-in-out alternate;
      pointer-events: none;
    }
    
    .p1 { width: 80px; height: 80px; background: rgba(59, 130, 246, 0.15); top: 10%; left: 5%; animation-delay: 0s; }
    .p2 { width: 60px; height: 60px; background: rgba(139, 92, 246, 0.1); top: 80%; right: 10%; animation-delay: -3s; }
    .p3 { width: 100px; height: 100px; background: rgba(30, 59, 153, 0.2); bottom: 15%; left: 15%; animation-delay: -6s; }

    @keyframes float {
      from { transform: translate(0, 0); }
      to { transform: translate(20px, -20px); }
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 3.75rem;
      line-height: 1;
      letter-spacing: -3px;
      margin-bottom: 0.5rem;
      /* Strong blue gradient text with glow */
      background: linear-gradient(to right, #3b82f6, #60a5fa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 0 15px rgba(59, 130, 246, 0.4),
        0 0 30px rgba(96, 165, 250, 0.3);
    }

    p.description {
      font-size: 1.25rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 3rem;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .status-badge {
      display: inline-block;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      color: #93c5fd;
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 
        0 10px 25px rgba(0, 0, 0, 0.5),
        inset 0 0 5px rgba(59, 130, 246, 0.2);
      backdrop-filter: blur(8px);
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
    }

    .status-badge::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50px;
      background: rgba(59, 130, 246, 0.05);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status-badge:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 15px 40px rgba(59, 130, 246, 0.3),
        inset 0 0 8px rgba(59, 130, 246, 0.3);
      border-color: #60a5fa;
      color: #ffffff;
    }

    .status-badge:hover::after {
      opacity: 1;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.75rem; }
      p.description { font-size: 1rem; }
      .container { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <!-- Decorative particles -->
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>

  <div class="container">
    <h1>Lyubelsky</h1>
    <p class="description">
      🎁️ Games, assets, software, services.<br>
      ❤️ One great place.
    </p>
    <span class="status-badge">Coming soon…</span>

    <footer>
      &copy; 2026 Lyubelsky. All rights reserved.
    </footer>
  </div>
</body>
</html>
