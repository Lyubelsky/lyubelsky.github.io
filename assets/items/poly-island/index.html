<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Poly Island by Lyubelsky Assets.">
    <title>Lyubelsky</title>
    <link rel="shortcut icon" href="favicon.jpg" type="image/jpeg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1><b style="color: rgb(238, 87, 18); text-shadow: 0 0 5px rgba(238, 87, 18, 0.8);">L</b>yubelsky</h1>
    <hr>
    <img src="images/logo.png" class="logo">
    <h1 class="title">Poly Island</h1>

    <button class="purchase">Purchase</button>
    <br>
    <p style="background-color: rgb(238, 87, 18); box-shadow: 0 0 5px rgba(238, 87, 18, 0.8); color: white; font-size: 16px; display: inline; padding: 5px; border-radius: 10px;">$1.00</p>

    <div class="wrapper-cont" style="display: flex; align-items: center; justify-content: center;">
        <div class="wrapper">
            <div class="carousel">
                <img src="images/palm-tree.png" draggable="false">
                <img src="images/hut.png" draggable="false">
                <img src="images/island.png" draggable="false">
                <img src="images/boat.png" draggable="false">
                <img src="images/fire-place.png" draggable="false">
                <img src="images/fish.png" draggable="false">
                <img src="images/water-bottle.png" draggable="false">
                <img src="images/rock.png" draggable="false">
                <img src="images/rain-catcher.png" draggable="false">
                <img src="images/paddle.png" draggable="false">
                <img src="images/fishing-stick.png" draggable="false">
            </div>
        </div>
    </div>

    <p style="font-size: 24px; margin-left: 20%; margin-right: 20%; text-align: left;">This salty low-poly island pack is high-quality and game-ready!</p>
    
    <!-- <div style="display: flex; justify-content: center;">
        <div class="content">
            <h4 style="margin: 0; margin-bottom: 10px;">Features</h4>
            <p class="content-item"><b>Jump Scares</b></p>
        </div>
    </div> !-->

    <div class="specs">
        <div class="spec">
            Files
            <p class="tag" style="margin-left: 5px;">FBX</p>
            <p class="tag" style="margin-left: 5px;">GLB</p>
        </div>
    </div>
    
    <hr style="margin-top: 20px;">
    <p style="margin-bottom: 30px;">&copy; Lyubelsky <b style="color: rgb(238, 87, 18); text-shadow: 0 0 5px rgba(238, 87, 18, 0.8); font-size: 18px;">2026</b>. All rights reserved.</p>

    <script src="script.js"></script>
</body>
</html>
